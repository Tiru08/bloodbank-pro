{% extends "base.html" %}
{% block title %}— {% if donor %}Edit Donor{% else %}Add Donor{% endif %}{% endblock %}
{% block content %}
<div class="topbar">
  <h1>{% if donor %}Edit Donor{% else %}Add New Donor{% endif %}</h1>
  <a href="/donors" class="btn btn-secondary btn-sm">← Back</a>
</div>
<div class="content">
  <div class="card" style="max-width:600px">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input name="name" class="form-control" required value="{{ donor.name if donor else '' }}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Age</label>
          <input name="age" type="number" class="form-control" value="{{ donor.age if donor else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Blood Type</label>
          <select name="blood_type" class="form-control">
            {% for bt in blood_types %}
            <option value="{{ bt }}" {% if donor and donor.blood_type==bt %}selected{% endif %}>{{ bt }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Weight (kg)</label>
          <input name="weight" type="number" step="0.1" class="form-control" value="{{ donor.weight if donor else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Hemoglobin (g/dL)</label>
          <input name="hemoglobin" type="number" step="0.1" class="form-control" value="{{ donor.hemoglobin if donor else '' }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input name="phone" class="form-control" value="{{ donor.phone if donor else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-control">
            {% for g in ['Male','Female','Other'] %}
            <option value="{{ g }}" {% if donor and donor.gender==g %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-control" value="{{ donor.email if donor else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Last Donation Date</label>
        <input name="last_donation" type="date" class="form-control" value="{{ donor.last_donation if donor else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Medical Conditions (leave blank if none)</label>
        <input name="medical_conditions" class="form-control" value="{{ donor.medical_conditions if donor else '' }}">
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">💾 Save Donor</button>
        <a href="/donors" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
