{% extends "base.html" %}
{% block title %}— ML Tools{% endblock %}
{% block content %}
<div class="topbar"><h1>🤖 ML Tools</h1></div>
<div class="content">

  <!-- Tabs -->
  <div style="display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0">
    <button class="tab-btn active" onclick="showTab('elig')">Donor Eligibility</button>
    <button class="tab-btn" onclick="showTab('demand')">Demand Forecast</button>
    <button class="tab-btn" onclick="showTab('compat')">Compatibility Checker</button>
  </div>

  <!-- Eligibility Tab -->
  <div id="tab-elig" class="tab-panel">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">Check Donor Eligibility</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Age</label><input id="e-age" class="form-control" type="number" value="28"></div>
          <div class="form-group"><label class="form-label">Weight (kg)</label><input id="e-weight" class="form-control" type="number" value="70"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Hemoglobin (g/dL)</label><input id="e-hemo" class="form-control" type="number" step="0.1" value="13.5"></div>
          <div class="form-group"><label class="form-label">Donations Count</label><input id="e-don" class="form-control" type="number" value="3"></div>
        </div>
        <div class="form-group"><label class="form-label">Last Donation Date</label><input id="e-last" class="form-control" type="date" value="2024-01-01"></div>
        <div class="form-group"><label class="form-label">Medical Conditions (blank if none)</label><input id="e-cond" class="form-control" placeholder="e.g. diabetes, hypertension"></div>
        <button class="btn btn-primary" onclick="checkEligibility()" style="width:100%">Check Eligibility</button>
      </div>
      <div class="card" id="elig-result">
        <div class="card-title">Result</div>
        <div style="color:var(--dim);font-size:13px;text-align:center;padding:40px 0">Fill the form and click Check Eligibility</div>
      </div>
    </div>
  </div>

  <!-- Demand Tab -->
  <div id="tab-demand" class="tab-panel" style="display:none">
    <div class="card">
      <div class="card-title">Next Month Blood Demand Forecast</div>
      <button class="btn btn-primary" onclick="loadForecast()" style="margin-bottom:16px">📈 Run Forecast</button>
      <div id="forecast-result"></div>
      <canvas id="forecastChart" style="display:none;margin-top:16px;max-height:250px" height="120"></canvas>
    </div>
  </div>

  <!-- Compatibility Tab -->
  <div id="tab-compat" class="tab-panel" style="display:none">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">Blood Compatibility Checker</div>
        <div class="form-group">
          <label class="form-label">Donor Blood Type</label>
          <select id="c-donor" class="form-control">
            {% for bt in blood_types %}<option>{{ bt }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Recipient Blood Type</label>
          <select id="c-recip" class="form-control">
            {% for bt in blood_types %}<option>{{ bt }}</option>{% endfor %}
          </select>
        </div>
        <button class="btn btn-primary" onclick="checkCompat()" style="width:100%">Check Compatibility</button>
        <div id="compat-result" style="margin-top:16px"></div>
      </div>
      <div class="card">
        <div class="card-title">Full Compatibility Matrix</div>
        <div id="matrix" style="font-size:11px"></div>
      </div>
    </div>
  </div>

</div>

<style>
.tab-btn{padding:10px 18px;background:none;border:none;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}
</style>

<script>
function showTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).style.display='block';
  event.target.classList.add('active');
  if(id==='compat') buildMatrix();
}

async function checkEligibility() {
  const body = {
    age: +document.getElementById('e-age').value,
    weight: +document.getElementById('e-weight').value,
    hemoglobin: +document.getElementById('e-hemo').value,
    donations_count: +document.getElementById('e-don').value,
    last_donation: document.getElementById('e-last').value,
    medical_conditions: document.getElementById('e-cond').value
  };
  const res = await fetch('/api/eligibility', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data = await res.json();
  const el = document.getElementById('elig-result');
  const color = data.eligible ? '#2ECC71' : '#E74C3C';
  const bg = data.eligible ? '#0d2e1e' : '#2e0d0d';
  const icon = data.eligible ? '✅' : '⛔';
  const text = data.eligible ? 'ELIGIBLE TO DONATE' : 'NOT ELIGIBLE';
  let reasons = data.reasons.length ? data.reasons.map(r=>`<div style="color:#F39C12;font-size:12px;margin:4px 0">⚠ ${r}</div>`).join('') : '<div style="color:#2ECC71;font-size:12px;margin-top:8px">✓ All criteria met</div>';
  el.innerHTML = `<div class="card-title">Result</div>
    <div style="background:${bg};border-radius:10px;padding:16px;border:1px solid ${color}">
      <div style="font-size:20px;font-weight:700;color:${color}">${icon} ${text}</div>
      <div style="font-size:12px;color:var(--dim);margin-top:6px">Confidence: <strong style="color:var(--text)">${data.confidence}%</strong> · Days since last donation: <strong style="color:var(--text)">${data.days_since_last}</strong></div>
    </div>
    <div style="margin-top:12px">${reasons}</div>
    ${data.next_eligible_date && data.next_eligible_date!='Now' ? `<div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--accent2)">📅 Next eligible: <strong>${data.next_eligible_date}</strong></div>` : ''}`;
}

let forecastChartInst = null;
async function loadForecast() {
  document.getElementById('forecast-result').innerHTML = '<div style="color:var(--dim);font-size:13px">Running forecast...</div>';
  const res = await fetch('/api/forecast');
  const data = await res.json();
  if(!data.length){ document.getElementById('forecast-result').innerHTML='<div style="color:var(--danger)">Models still training, try again in a few seconds.</div>'; return; }
  const BT_COLORS={"A+":"#E63946","A-":"#C0392B","B+":"#F39C12","B-":"#D35400","O+":"#27AE60","O-":"#1E8449","AB+":"#2980B9","AB-":"#1A5276"};
  document.getElementById('forecast-result').innerHTML = `<div style="color:var(--dim);font-size:12px;margin-bottom:8px">Forecast for: <strong style="color:var(--text)">${data[0].month}</strong></div>`;
  const canvas = document.getElementById('forecastChart');
  canvas.style.display='block';
  if(forecastChartInst) forecastChartInst.destroy();
  forecastChartInst = new Chart(canvas, {
    type:'bar',
    data:{
      labels:data.map(d=>d.blood_type),
      datasets:[{
        label:'Forecast Units',
        data:data.map(d=>d.forecast_units),
        backgroundColor:data.map(d=>BT_COLORS[d.blood_type]||'#E63946'),
        borderRadius:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#8899AA'},grid:{color:'#253545'}},y:{ticks:{color:'#8899AA'},grid:{color:'#253545'}}}
    }
  });
}

async function checkCompat() {
  const donor = document.getElementById('c-donor').value;
  const recip = document.getElementById('c-recip').value;
  const res = await fetch(`/api/compatibility?donor=${donor}&recipient=${recip}`);
  const data = await res.json();
  const color = data.compatible ? '#2ECC71' : '#E74C3C';
  const bg = data.compatible ? '#0d2e1e' : '#2e0d0d';
  document.getElementById('compat-result').innerHTML = `
    <div style="background:${bg};border-radius:10px;padding:14px;border:1px solid ${color}">
      <div style="font-size:18px;font-weight:700;color:${color}">${data.compatible ? '✅ COMPATIBLE' : '❌ INCOMPATIBLE'}</div>
      <div style="font-size:12px;color:var(--dim);margin-top:6px">${donor} → ${recip}</div>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--dim)">
      <div style="margin-bottom:4px">Donor can give to: <span style="color:var(--text)">${data.donor_can_give_to.join(', ')}</span></div>
      <div>Recipient accepts from: <span style="color:var(--text)">${data.recipient_can_receive_from.join(', ')}</span></div>
    </div>`;
}

function buildMatrix() {
  const bts = {{ blood_types | tojson }};
  const BT_COLORS={"A+":"#E63946","A-":"#C0392B","B+":"#F39C12","B-":"#D35400","O+":"#27AE60","O-":"#1E8449","AB+":"#2980B9","AB-":"#1A5276"};
  const canDonateTo={"O-":["O-","O+","A-","A+","B-","B+","AB-","AB+"],"O+":["O+","A+","B+","AB+"],"A-":["A-","A+","AB-","AB+"],"A+":["A+","AB+"],"B-":["B-","B+","AB-","AB+"],"B+":["B+","AB+"],"AB-":["AB-","AB+"],"AB+":["AB+"]};
  let html = '<table style="border-collapse:collapse;font-size:11px"><tr><td style="padding:3px 6px"></td>';
  bts.forEach(bt => html += `<td style="padding:3px 6px;font-weight:700;color:${BT_COLORS[bt]};text-align:center">${bt}</td>`);
  html += '</tr>';
  bts.forEach(donor => {
    html += `<tr><td style="padding:3px 6px;font-weight:700;color:${BT_COLORS[donor]}">${donor}</td>`;
    bts.forEach(recip => {
      const ok = (canDonateTo[donor]||[]).includes(recip);
      html += `<td style="text-align:center;padding:3px 5px;background:${ok?'#0d2e1e':'#2e0d0d'};border-radius:4px;margin:1px;color:${ok?'#2ECC71':'#E74C3C'}">${ok?'✓':'✗'}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('matrix').innerHTML = html;
}
</script>
{% endblock %}
